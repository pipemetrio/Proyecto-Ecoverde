name: Artefacto de prueba

on:
  workflow_dispatch:

jobs:
  generar-artefacto:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear archivo de evidencia
        run: |
          echo "Evidencia del workflow" > evidencia.txt
          echo "Fecha: $(date)" >> evidencia.txt

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-workflow
          path: evidencia.txt