services:
  web:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - app-data:/data
    secrets:
      - banner_msg
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:

secrets:
  banner_msg:
    file: ./secrets/banner_msg.txt
